[global]
   workgroup = TESTGROUP
   server string = Test SMB Server
   security = user
   map to guest = never
   log level = 1
   server min protocol = SMB2
   server max protocol = SMB3
   passdb backend = tdbsam:/var/lib/samba/private/passdb.tdb

[testshare]
   path = /home/smbuser/share
   browseable = yes
   read only = no
   valid users = smbuser
   create mask = 0644
   directory mask = 0755
