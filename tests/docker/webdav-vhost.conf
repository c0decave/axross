DavLockDB /var/lib/dav/lockdb

<VirtualHost *:80>
    ServerName webdav
    DocumentRoot /var/www/webdav

    <Directory /var/www/webdav>
        Options Indexes
        Require all granted
    </Directory>

    <Location />
        Dav On
        AuthType Basic
        AuthName "WebDAV"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Location>
</VirtualHost>
