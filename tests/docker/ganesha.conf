NFS_Core_Param {
    NFS_Port = 2049;
    # Enable both v3 and v4. Minimal kernels often expose only the v4
    # client (no rpcbind/portmapper needed), so v4 must be available for
    # tests that mount from containers.
    NFS_Protocols = 3,4;
    Manage_Gids_Expiration = 3600;
}
NFSV4 {
    Grace_Period = 5;
}
EXPORT {
    Export_Id = 1;
    Path = /srv/nfs/share;
    # NFSv4 clients traverse the pseudo-FS tree rooted here. Keeping the
    # pseudo path identical to the real path works for v3, but for v4 the
    # client mounts the pseudo path — we expose it at "/" so both flows
    # see the same content without an extra traversal.
    Pseudo = /;
    Access_Type = RW;
    Squash = No_Root_Squash;
    Transports = TCP;
    Protocols = 3,4;
    SecType = sys,none;
    FSAL {
        Name = VFS;
    }
}
