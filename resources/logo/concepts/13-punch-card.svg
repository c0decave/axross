<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="axross punch card">
  <title>axross — Hollerith punch card spelling 'AXROSS'</title>
  <style>
    .card { fill: #FAEFD0; stroke: #6B4F2A; stroke-width: 1; }
    .hole { fill: #1A1208; }
    .label { font-family: ui-monospace, monospace; font-size: 7px; fill: #6B4F2A; }
    @media (prefers-color-scheme: dark) {
      .card { fill: #2A1F0A; stroke: #C8A475; }
      .hole { fill: #FAEFD0; }
      .label { fill: #C8A475; }
    }
  </style>
  <!-- card with classic top-right corner cut -->
  <path class="card" d="M6 6 L186 6 L194 14 L194 74 L6 74 Z"/>
  <!-- label letters across the top -->
  <g class="label">
    <text x="20"  y="18">A</text>
    <text x="48"  y="18">X</text>
    <text x="76"  y="18">R</text>
    <text x="104" y="18">O</text>
    <text x="132" y="18">S</text>
    <text x="160" y="18">S</text>
  </g>
  <!-- punched holes per column (different patterns for each letter) -->
  <g class="hole">
    <!-- A: rows 1+12 -->
    <rect x="16"  y="22" width="10" height="4" rx="1"/>
    <rect x="16"  y="64" width="10" height="4" rx="1"/>
    <!-- X: rows 2+12+9 -->
    <rect x="44"  y="28" width="10" height="4" rx="1"/>
    <rect x="44"  y="58" width="10" height="4" rx="1"/>
    <!-- R: rows 11+9+rev -->
    <rect x="72"  y="34" width="10" height="4" rx="1"/>
    <rect x="72"  y="46" width="10" height="4" rx="1"/>
    <rect x="72"  y="58" width="10" height="4" rx="1"/>
    <!-- O: rows 11+6 -->
    <rect x="100" y="34" width="10" height="4" rx="1"/>
    <rect x="100" y="52" width="10" height="4" rx="1"/>
    <!-- S: rows 0+2 -->
    <rect x="128" y="22" width="10" height="4" rx="1"/>
    <rect x="128" y="34" width="10" height="4" rx="1"/>
    <!-- S: same -->
    <rect x="156" y="22" width="10" height="4" rx="1"/>
    <rect x="156" y="34" width="10" height="4" rx="1"/>
  </g>
  <!-- column-numbering dotted line along bottom -->
  <g class="label">
    <text x="20"  y="72">1</text>
    <text x="48"  y="72">2</text>
    <text x="76"  y="72">3</text>
    <text x="104" y="72">4</text>
    <text x="132" y="72">5</text>
    <text x="160" y="72">6</text>
  </g>
</svg>
