  <rect x="0" y="0" width="96" height="96" fill="url(#bg)" rx="6"/>
  <g stroke="#14B8A6" stroke-width="0.6" stroke-linecap="round" opacity="0.7">
    <line x1="20" y1="20" x2="76" y2="76"/>
    <line x1="76" y1="20" x2="20" y2="76"/>
    <line x1="48" y1="48" x2="48" y2="14"/>
