    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
