    <circle cx="76" cy="20" r="3"/>
    <circle cx="48" cy="48" r="4.5"/>
    <circle cx="20" cy="76" r="3"/>
    <circle cx="76" cy="76" r="3.5"/>
    <circle cx="48" cy="14" r="2.4"/>
    <circle cx="84" cy="50" r="2.2"/>
    <circle cx="32" cy="60" r="1.5"/>
    <circle cx="62" cy="32" r="1.6"/>
    <circle cx="14" cy="50" r="1.2"/>
  </g>
  <text x="48" y="92" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="8" fill="#94A3B8" letter-spacing="2">AXROSS</text>
</svg>
