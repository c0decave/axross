<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="axross mobius">
  <title>axross — Möbius strip (single surface, two sides crossing)</title>
  <defs>
    <linearGradient id="mobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <style>
    .ink { stroke: #0F172A; fill: none; stroke-width: 1.4; stroke-linejoin: round; }
    @media (prefers-color-scheme: dark) { .ink { stroke: #F8FAFC; } }
  </style>
  <!-- Möbius drawn as two curves, one in front and one behind, with a twist in the middle -->
  <g>
    <path d="M16 56
             C 16 24, 80 24, 80 56
             C 80 72, 60 76, 48 60
             C 36 44, 16 48, 16 56 Z"
          fill="url(#mobg)" opacity="0.85"/>
    <!-- twist outline -->
    <path class="ink"
          d="M16 56
             C 16 24, 80 24, 80 56
             C 80 72, 60 76, 48 60
             C 36 44, 16 48, 16 56 Z"/>
    <!-- inner edge to suggest the strip's other surface -->
    <path class="ink" stroke-dasharray="3 3"
          d="M22 52
             C 22 32, 74 32, 74 52
             C 74 64, 58 68, 50 58
             C 42 48, 22 50, 22 52"/>
  </g>
</svg>
