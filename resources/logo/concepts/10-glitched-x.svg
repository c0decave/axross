<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="axross glitched x">
  <title>axross — glitched 'X' (cyberpunk RGB-shift)</title>
  <style>
    .stroke { fill: none; stroke-width: 8; stroke-linecap: square; }
    .r { stroke: #FF0066; mix-blend-mode: screen; }
    .g { stroke: #00FF88; mix-blend-mode: screen; }
    .b { stroke: #00C8FF; mix-blend-mode: screen; }
    .ink { stroke: #0F172A; mix-blend-mode: normal; }
    @media (prefers-color-scheme: dark) { .ink { stroke: #F8FAFC; } }
  </style>
  <rect x="0" y="0" width="96" height="96" fill="#0F172A"/>
  <g class="stroke">
    <!-- offset RGB X strokes (like CRT chromatic aberration) -->
    <line class="r" x1="14" y1="18" x2="78" y2="82"/>
    <line class="r" x1="78" y1="18" x2="14" y2="82"/>
    <g transform="translate(2 -2)">
      <line class="g" x1="14" y1="18" x2="78" y2="82"/>
      <line class="g" x1="78" y1="18" x2="14" y2="82"/>
    </g>
    <g transform="translate(-2 2)">
      <line class="b" x1="14" y1="18" x2="78" y2="82"/>
      <line class="b" x1="78" y1="18" x2="14" y2="82"/>
    </g>
    <!-- horizontal scan-line glitch bars -->
    <rect class="r" x="6" y="40" width="84" height="2" fill="#FF0066" stroke="none" opacity="0.7"/>
    <rect class="b" x="6" y="58" width="60" height="1.5" fill="#00C8FF" stroke="none" opacity="0.7"/>
  </g>
</svg>
