<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="axross origami fox">
  <title>axross — origami fox (cunning + cross-network mascot)</title>
  <style>
    .face { fill: #14B8A6; stroke: #0F172A; stroke-width: 1.4; stroke-linejoin: round; }
    .mark { fill: #F8FAFC; stroke: #0F172A; stroke-width: 1.2; stroke-linejoin: round; }
    .eye  { fill: #0F172A; }
    @media (prefers-color-scheme: dark) {
      .mark { fill: #0F172A; }
      .face { stroke: #F8FAFC; }
    }
  </style>
  <!-- triangular fox face: two ears top, V-shape muzzle -->
  <polygon class="face" points="48,12 84,72 12,72"/>
  <!-- inner muzzle (lighter) -->
  <polygon class="mark" points="48,42 70,68 26,68"/>
  <!-- ears as filled dark inner triangles -->
  <polygon class="eye" points="20,30 32,16 30,38"/>
  <polygon class="eye" points="76,30 64,16 66,38"/>
  <!-- eyes -->
  <circle class="eye" cx="36" cy="50" r="3"/>
  <circle class="eye" cx="60" cy="50" r="3"/>
  <!-- nose -->
  <polygon class="eye" points="48,58 52,64 44,64"/>
  <!-- subtle 'X' marker on forehead -->
  <path d="M42 26 L54 38 M54 26 L42 38" stroke="#0F172A" stroke-width="1.6"
        stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
