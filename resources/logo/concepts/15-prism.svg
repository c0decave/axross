<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" role="img" aria-label="axross prism">
  <title>axross — prism splitting one input into many protocols</title>
  <style>
    .ink { stroke: #0F172A; fill: none; stroke-width: 1.4; stroke-linejoin: round; }
    .prism { fill: rgba(20,184,166,0.15); stroke: #14B8A6; stroke-width: 1.6; }
    .beam-in { stroke: #F8FAFC; stroke-width: 2; }
    .beam-r { stroke: #EF4444; stroke-width: 1.6; }
    .beam-y { stroke: #EAB308; stroke-width: 1.6; }
    .beam-g { stroke: #22C55E; stroke-width: 1.6; }
    .beam-b { stroke: #3B82F6; stroke-width: 1.6; }
    .beam-v { stroke: #A855F7; stroke-width: 1.6; }
    .label { font-family: ui-monospace, monospace; font-size: 5px; fill: #64748B; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #F8FAFC; }
      .beam-in { stroke: #0F172A; }
    }
  </style>
  <!-- triangular prism -->
  <polygon class="prism" points="58,18 92,40 58,62"/>
  <!-- single white incoming beam from left -->
  <line class="beam-in" x1="6" y1="40" x2="58" y2="40"/>
  <!-- spread of beams emerging from the prism (each tagged with a protocol) -->
  <g>
    <line class="beam-r" x1="92" y1="40" x2="154" y2="14"/>
    <line class="beam-y" x1="92" y1="40" x2="156" y2="26"/>
    <line class="beam-g" x1="92" y1="40" x2="158" y2="40"/>
    <line class="beam-b" x1="92" y1="40" x2="156" y2="54"/>
    <line class="beam-v" x1="92" y1="40" x2="154" y2="66"/>
  </g>
  <!-- protocol labels -->
  <g class="label">
    <text x="142" y="13">SFTP</text>
    <text x="142" y="25">S3</text>
    <text x="142" y="40">SMB</text>
    <text x="142" y="55">DAV</text>
    <text x="142" y="68">FTP</text>
  </g>
</svg>
