<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="axross sigil">
  <title>axross — occult sigil with letters embedded</title>
  <style>
    .ink { stroke: #14B8A6; stroke-width: 1.4; fill: none; stroke-linecap: round; }
    .ink-thin { stroke: #14B8A6; stroke-width: 0.8; fill: none; opacity: 0.7; }
    .glyph { fill: #14B8A6; font-family: serif; font-size: 7px; font-style: italic; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #5EEAD4; }
      .ink-thin { stroke: #5EEAD4; }
      .glyph { fill: #5EEAD4; }
    }
  </style>
  <rect x="0" y="0" width="96" height="96" fill="#0F172A" rx="6"/>
  <!-- outer circle + ring of inscriptions -->
  <circle class="ink" cx="48" cy="48" r="40"/>
  <circle class="ink-thin" cx="48" cy="48" r="34"/>
  <!-- six pointed star (Solomon-style) -->
  <polygon class="ink" points="48,16 64,46 30,30 66,30 32,46"/>
  <polygon class="ink" points="48,80 64,50 30,66 66,66 32,50"/>
  <!-- cross-strand X through the middle -->
  <line class="ink" x1="22" y1="22" x2="74" y2="74"/>
  <line class="ink" x1="74" y1="22" x2="22" y2="74"/>
  <!-- letters A X R O S S placed around the outer ring -->
  <g class="glyph">
    <text x="46" y="11" text-anchor="middle">A</text>
    <text x="84" y="32">X</text>
    <text x="84" y="64">R</text>
    <text x="46" y="92" text-anchor="middle">O</text>
    <text x="6"  y="64">S</text>
    <text x="6"  y="32">S</text>
  </g>
  <!-- center dot -->
  <circle cx="48" cy="48" r="2.2" fill="#14B8A6"/>
</svg>
