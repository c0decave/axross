<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-label="axross neon sign">
  <title>axross — neon sign (vaporwave / cyber-neon)</title>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: #1A0F2E; }
    .neon-pink { fill: none; stroke: #FF3B7A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
                 filter: url(#glow); }
    .neon-cyan { fill: none; stroke: #00E0FF; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
                 filter: url(#glow); }
    .word { font-family: "Brush Script MT", "Pacifico", "Comic Sans MS", cursive;
            font-size: 56px; font-style: italic; fill: none;
            stroke: #FF3B7A; stroke-width: 2.4; filter: url(#glow); paint-order: stroke; }
  </style>
  <rect class="bg" x="0" y="0" width="240" height="96" rx="6"/>
  <!-- horizon scanlines -->
  <g stroke="#3B0F5C" stroke-width="0.6" opacity="0.7">
    <line x1="0" y1="60" x2="240" y2="60"/>
    <line x1="0" y1="68" x2="240" y2="68"/>
    <line x1="0" y1="76" x2="240" y2="76"/>
    <line x1="0" y1="84" x2="240" y2="84"/>
  </g>
  <!-- the word in cursive neon -->
  <text class="word" x="20" y="60">axross</text>
  <!-- decorative cyan X above -->
  <g class="neon-cyan">
    <line x1="190" y1="14" x2="220" y2="44"/>
    <line x1="220" y1="14" x2="190" y2="44"/>
  </g>
  <!-- mounting brackets -->
  <g class="neon-pink" stroke-width="1.4" opacity="0.7">
    <line x1="20" y1="78" x2="20" y2="92"/>
    <line x1="220" y1="78" x2="220" y2="92"/>
  </g>
</svg>
